<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no"
  >

  <meta name="theme-color" content="#020617">
  <meta name="color-scheme" content="dark">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="WC 2026">

  <meta name="mobile-web-app-capable" content="yes">

  <meta
    name="description"
    content="Porra familiar del Mundial 2026. Resultados en vivo, clasificación automática y experiencia Apple Ultra."
  >

  <link rel="manifest" href="./manifest.json">

  <link
    rel="icon"
    href="./icons/icon-192.png"
    type="image/png"
  >

  <link
    rel="apple-touch-icon"
    href="./icons/icon-180.png"
  >

  <link rel="stylesheet" href="./style.css">

  <title>World Cup 2026 • Family Predictor</title>
  
  <style>
    /* Estilos base mínimos para el Modal (puedes moverlos a tu style.css) */
    .modal {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal[hidden] { display: none !important; }
    .modal-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
    }
    .modal-content {
      position: relative; z-index: 1; width: 100%; max-width: 350px;
      background: #0f172a; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; padding: 24px; text-align: center;
    }
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px);
      border-top: 1px solid rgba(255,255,255,0.05);
      display: flex; justify-content: space-around; padding: 12px 10px calc(12px + env(safe-area-inset-bottom));
      z-index: 1000;
    }
    .nav-item {
      background: none; border: none; color: #94a3b8; font-size: 14px;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .nav-item.active { color: #3b82f6; }
    #main-content { padding-bottom: 90px; } /* Espacio para el nav bottom */
  </style>
</head>

<body>

  <div
    id="offline-banner"
    hidden
    class="offline-banner"
    role="status"
    style="background: #ef4444; color: white; text-align: center; padding: 8px; font-size: 13px; display: flex; justify-content: center; align-items: center; gap: 8px;"
  >
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
      <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 14v-4m0-4h.01"/>
    </svg>
    <span>Sin conexión · Trabajando offline</span>
  </div>

  <header class="app-header">
    <div class="header-inner">
      <div class="header-left">
        <div class="logo-ball">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 2a10 10 0 0 1 0 20 10 10 0 0 1 0-20zm0 0v20"/>
          </svg>
        </div>
        <div>
          <h1 class="header-title">World Cup 2026</h1>
          <p class="header-subtitle">Family Predictor</p>
        </div>
      </div>

      <div class="header-right">
        <button
          id="btn-refresh"
          class="icon-button"
          data-action="refresh"
          aria-label="Actualizar datos"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
            <path d="M23 4v6h-6M1 20v-6h6"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>
        </button>

        <button
          id="btn-share"
          class="icon-button"
          aria-label="Compartir clasificación"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
            <circle cx="18" cy="5" r="3"/>
            <circle cx="6" cy="12" r="3"/>
            <circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main id="main-content" class="container app-shell">
    <section class="hero-section">
      <div class="premium-badge">
        <svg
          class="badge-icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          width="16" height="16"
        >
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
        <span>Experiencia Apple Ultra</span>
      </div>

      <h2 class="hero-title">
        La porra del Mundial<br>
        reinventada.
      </h2>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Partidos</div>
          <div class="stat-number" id="totalPartidos">--</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Jugados</div>
          <div class="stat-number" id="totalJugados">--</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">En Directo</div>
          <div class="stat-number" id="totalLive">--</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Familia</div>
          <div class="stat-number" id="totalUsers">--</div>
        </div>
      </div>
    </section>

    <section class="filters-bar" style="display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px;"></section>

    <section
      id="grid-fixture"
      class="matches-grid"
      aria-live="polite"
    ></section>

    <section
      id="estadisticas-avanzadas"
      class="glass-card"
      style="margin-top: 16px;"
    ></section>

    <section
      id="tabla-clasificacion"
      class="leaderboard-container glass-card"
      style="margin-top: 16px; margin-bottom: 20px;"
    ></section>
  </main>

  <nav class="bottom-nav" aria-label="Navegación principal">
    <button class="nav-item active" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
      <span style="font-size: 20px;">🏠</span>
      <span>Inicio</span>
    </button>
    <button class="nav-item" onclick="Modal.show('modal-add-user')">
      <span style="font-size: 20px;">➕</span>
      <span>Participante</span>
    </button>
  </nav>

  <div
    id="modal-add-user"
    class="modal"
    hidden
    role="dialog"
    aria-modal="true"
  >
    <div class="modal-overlay" onclick="Modal.hide('modal-add-user')"></div>
    <div class="modal-content glass-card">
      <h3 style="margin-bottom: 8px; font-size: 18px;">Nuevo Participante</h3>
      <p style="font-size: 13px; color: #94a3b8;
